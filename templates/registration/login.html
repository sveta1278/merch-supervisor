<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Мерчандайзинг</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">
      <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
          <h1 class="h4 text-center mb-4 fw-bold text-primary">
            <i class="bi bi-shop me-2"></i>Мерчандайзинг
          </h1>
          {% if form.errors %}
            <div class="alert alert-danger mb-3">Неверный логин или пароль.</div>
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-medium">Логин</label>
              <input type="text" name="username" class="form-control form-control-lg"
                     autofocus autocomplete="username" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-medium">Пароль</label>
              <input type="password" name="password" class="form-control form-control-lg"
                     autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Войти</button>
            <input type="hidden" name="next" value="{{ next }}">
          </form>
          <hr class="my-3">
          <p class="text-center text-muted small mb-0">
            Нет аккаунта?
            <a href="{% url 'register' %}" class="fw-medium text-primary text-decoration-none">Зарегистрироваться</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
