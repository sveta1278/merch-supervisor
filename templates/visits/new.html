{% extends "base.html" %}
{% block title %}Новый визит — Мерчандайзинг{% endblock %}

{% block content %}
<div class="mb-3">
  <a href="{% url 'store_list' %}" class="text-decoration-none text-muted">
    <i class="bi bi-arrow-left me-1"></i>Назад к магазинам
  </a>
</div>

<h5 class="fw-bold mb-4">Новый визит</h5>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="mb-3">
      <div class="text-muted small">Магазин</div>
      <div class="fw-semibold fs-5">{{ store.name }}</div>
      <div class="text-muted">{{ store.network }}</div>
      <div class="text-muted small">{{ store.address }}</div>
    </div>
    <hr>
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="store_id" value="{{ store.pk }}">
      <p class="text-muted">Будет создан чек-лист со всеми SKU из плана этого магазина.</p>
      <button type="submit" class="btn btn-primary w-100 py-3">
        <i class="bi bi-play-circle me-2"></i>Начать визит
      </button>
    </form>
  </div>
</div>
{% endblock %}
